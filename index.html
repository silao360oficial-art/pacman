<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Encuesta Silao – Breakout Político</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Anton&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060612;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:10px 0;min-height:100vh}

/* ── HUD ── */
#hud{display:flex;justify-content:space-between;align-items:center;width:640px;max-width:97vw;margin-bottom:6px;font-family:'Bangers',cursive;letter-spacing:2px;}
#hud-left,#hud-right{display:flex;flex-direction:column;align-items:flex-start;gap:0px;}
#hud-right{align-items:flex-end;}
.hud-label{font-size:11px;color:#4488aa;letter-spacing:3px;}
.hud-val{font-size:22px;color:#fff;text-shadow:0 0 10px #00d4ff,0 0 20px #00d4ff44;line-height:1;}
#hud-center{display:flex;flex-direction:column;align-items:center;}
#li{font-size:18px;letter-spacing:2px;filter:drop-shadow(0 0 6px #ff3366);}

/* ── BOARD WRAP with ring ── */
#board-outer{position:relative;display:inline-block;}
#board-outer::before{
  content:'';position:absolute;inset:-6px;border-radius:14px;
  background:conic-gradient(from 0deg,#ffd600,#ff4400,#c800ff,#0088ff,#00e5ff,#00ff88,#ffd600);
  z-index:0;animation:championRing var(--ring-dur,3s) linear infinite;opacity:0.9;
}
#board-outer::after{
  content:'';position:absolute;inset:-3px;border-radius:11px;
  background:#060612;z-index:1;
}
#board-outer canvas{position:relative;z-index:2;display:block;}
@keyframes championRing{
  0%  {filter:hue-rotate(0deg)  brightness(1.2);}
  50% {filter:hue-rotate(180deg)brightness(1.6);}
  100%{filter:hue-rotate(360deg)brightness(1.2);}
}
.corner-ball{
  position:absolute;z-index:3;width:20px;height:20px;
  border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff 0%,#00ccff 40%,#004488 100%);
  animation:orbitBall var(--ring-dur,3s) linear infinite;
}
.corner-ball.tl{top:-10px;left:-10px;animation-delay:0s;}
.corner-ball.tr{top:-10px;right:-10px;animation-delay:calc(var(--ring-dur,3s)*-.25);}
.corner-ball.bl{bottom:-10px;left:-10px;animation-delay:calc(var(--ring-dur,3s)*-.5);}
.corner-ball.br{bottom:-10px;right:-10px;animation-delay:calc(var(--ring-dur,3s)*-.75);}
@keyframes orbitBall{
  0%  {transform:translate(0,0) scale(1);}
  25% {transform:translate(5px,-5px) scale(1.2);}
  50% {transform:translate(0,0) scale(1);}
  75% {transform:translate(-5px,5px) scale(0.8);}
  100%{transform:translate(0,0) scale(1);}
}

/* ── CONTROLS ── */
#msg{margin-top:14px;font-family:'Bangers',cursive;font-size:18px;letter-spacing:2px;color:#06B6D4;min-height:22px;text-align:center;}
#btnWrap{display:flex;gap:12px;margin-top:10px}
button{padding:9px 26px;border:1px solid #ffd60066;border-radius:8px;background:#111827;color:#ffd600;cursor:pointer;font-size:13px;font-weight:700;font-family:'Bangers',cursive;letter-spacing:2px;}
button:hover{background:#1e293b;box-shadow:0 0 12px rgba(255,214,0,.4);}
#ctrl{font-size:11px;color:#444;margin-top:8px}

/* ── LEADERBOARD ── */
/* ── LEADERBOARD MODAL ── */
#lb-modal{display:none;position:fixed;inset:0;z-index:998;background:rgba(0,0,0,.75);
  justify-content:center;align-items:center;}
#lb-modal.show{display:flex;}
#lb-inner{background:linear-gradient(135deg,#0a0f1e,#0d1a3a);
  border:2px solid transparent;border-radius:14px;padding:18px 16px;
  width:min(92vw,420px);max-height:80vh;overflow-y:auto;
  background-clip:padding-box;position:relative;}
@property --lb-a{syntax:'<angle>';inherits:false;initial-value:0deg;}
@keyframes spinLb{to{--lb-a:360deg;}}
#lb-inner{
  border:2px solid transparent!important;
  background:linear-gradient(rgba(10,15,30,0.97),rgba(10,15,30,0.97)) padding-box,
    conic-gradient(from var(--lb-a),#ffd600,#ff4500,#00e5ff,#ffd600) border-box!important;
  animation:spinLb 4s linear infinite!important;
}
#lb-inner h3{font-family:'Bangers',cursive;font-size:22px;letter-spacing:4px;color:#ffd600;
  text-align:center;margin-bottom:10px;text-shadow:0 0 12px rgba(255,214,0,.6);}
#lb-inner table{width:100%;border-collapse:collapse;font-size:13px;}
#lb-inner th{background:linear-gradient(90deg,#ff6d00,#ffd600);color:#000;
  padding:6px 8px;font-family:'Orbitron','Bangers',monospace;font-size:11px;
  letter-spacing:1px;font-weight:900;}
#lb-inner td{padding:5px 8px;border-bottom:1px solid rgba(255,200,0,0.15);
  color:#fff;font-size:13px;font-weight:700;}
#lb-inner tr:first-child td{color:#ffd600;font-weight:900;font-size:15px;
  text-shadow:0 0 10px rgba(255,214,0,.8);}
#lb-inner tr:nth-child(2) td{color:#c0d8ff;}
#lb-inner tr:nth-child(3) td{color:#ffab40;}
#lb-close{position:absolute;top:10px;right:14px;background:none;border:none;
  color:#ffd600;font-size:22px;cursor:pointer;line-height:1;padding:0;}
#lb-loading{color:#ffd600;font-size:13px;text-align:center;font-weight:700;
  animation:pulse-lb 1.2s ease-in-out infinite;padding:12px;}
@keyframes pulse-lb{0%,100%{opacity:1;}50%{opacity:.4;}}
/* old external lb hidden */
#leaderboard{display:none!important;}

/* ── LEADERBOARD BTN in controls ── */
#lbBtn{background:linear-gradient(135deg,#1a0533,#0d1a3a);border:1px solid #ffd60066;
  color:#ffd600;padding:9px 18px;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:700;font-family:'Bangers',cursive;letter-spacing:2px;}
#lbBtn:hover{box-shadow:0 0 14px rgba(255,214,0,.5);}

#exitBtn{background:linear-gradient(135deg,#1a0a0a,#3a0d0d);border:1px solid #ef444466;
  color:#ef4444;padding:9px 18px;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:700;font-family:'Bangers',cursive;letter-spacing:2px;}
#exitBtn:hover{box-shadow:0 0 14px rgba(239,68,68,.5);}

/* ── MOBILE TOUCH HINT ── */
#ctrl{font-size:11px;color:#444;margin-top:8px}

/* leaderboard spinning border - tetris style */
@property --lb-a { syntax: '<angle>'; inherits: false; initial-value: 0deg; }
@keyframes spinLb { to { --lb-a: 360deg; } }
#leaderboard{
  width:640px;max-width:97vw;margin-top:14px;padding:13px 18px;
  border: 2px solid transparent !important;
  border-radius: 10px;
  background: linear-gradient(rgba(10,15,30,0.95), rgba(10,15,30,0.95)) padding-box,
    conic-gradient(from var(--lb-a), #ffd600, #ff4500, #00e5ff, #ffd600) border-box !important;
  animation: spinLb 4s linear infinite !important;
}
#leaderboard h3{font-family:'Bangers',cursive;font-size:22px;letter-spacing:4px;color:#ffd600;text-align:center;margin-bottom:10px;text-shadow:0 0 12px rgba(255,214,0,.6);}
/* single leader row */
#lb-rows{display:flex;flex-direction:column;gap:0;}
#leaderboard table{width:100%;border-collapse:collapse;font-size:13px;}
#leaderboard th{background:linear-gradient(90deg,#ff6d00,#ffd600);color:#000;padding:6px 8px;font-family:'Orbitron','Bangers',monospace;font-size:11px;letter-spacing:1px;font-weight:900;}
#leaderboard td{padding:5px 8px;border-bottom:1px solid rgba(255,200,0,0.15);color:#fff;font-size:13px;font-weight:700;}
#leaderboard tr:first-child td{color:#ffd600;font-weight:900;font-size:16px;text-shadow:0 0 10px rgba(255,214,0,.8);}
#leaderboard tr:nth-child(2) td{color:#c0d8ff;}
#leaderboard tr:nth-child(3) td{color:#ffab40;}
.lb-row{display:flex;align-items:center;gap:8px;font-size:14px;color:#ccc;padding:5px 8px;border-radius:6px;background:#ffffff07;}
.lb-row.top1{background:linear-gradient(90deg,#ffd60022,#ff440011);color:#ffd600;font-size:17px;}
.lb-medal{font-size:20px;min-width:26px;text-align:center;}
.lb-name{flex:1;font-family:'Bangers',cursive;letter-spacing:1px;}
.lb-pts{color:#06B6D4;font-weight:700;}
.lb-lv{color:#888;font-size:11px;}
#lb-loading{color:#ffd600;font-size:13px;text-align:center;font-weight:700;animation:pulse-lb 1.2s ease-in-out infinite;padding:12px;}
@keyframes pulse-lb{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── COUNTDOWN ── */
#countdown-overlay{display:none;position:absolute;inset:0;z-index:10;
  justify-content:center;align-items:center;pointer-events:none;}
#countdown-overlay.show{display:flex;}
#countdown-num{font-family:'Bangers',cursive;font-size:140px;color:#ffd600;
  text-shadow:0 0 40px #ffd600,0 0 80px #ff8800;
  animation:cdPop .9s ease-in-out forwards;}
@keyframes cdPop{0%{transform:scale(2);opacity:0;}40%{transform:scale(1);opacity:1;}80%{opacity:1;}100%{opacity:0;transform:scale(.5);}}

/* ── SOCIAL BUTTONS ── */
#social{display:flex;gap:8px;margin-bottom:8px;justify-content:center;flex-wrap:wrap;}
.soc-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;
  font-size:12px;font-weight:700;text-decoration:none;cursor:pointer;border:none;font-family:system-ui;}
.soc-web{background:#06B6D4;color:#000;}
.soc-app{background:#1d4ed8;color:#fff;}
.soc-fb{background:#1877f2;color:#fff;}
.soc-btn:hover{filter:brightness(1.2);}

/* ── ENTRY MODAL (apodo) ── */
#entry-modal{display:flex;position:fixed;inset:0;z-index:1000;
  background:radial-gradient(ellipse at center,#0a0f2e 0%,#000 100%);
  justify-content:center;align-items:center;}
#entry-box{
  text-align:center;width:min(92vw,400px);padding:32px 28px 28px;
  border:2px solid transparent!important;border-radius:20px;
  background:linear-gradient(rgba(6,6,24,0.97),rgba(6,6,24,0.97)) padding-box,
    conic-gradient(from var(--eb-a),#ffd600,#ff4500,#c800ff,#00e5ff,#ffd600) border-box!important;
  animation:spinEb 4s linear infinite!important;
  box-shadow:0 0 60px rgba(255,214,0,.15);
}
@property --eb-a{syntax:'<angle>';inherits:false;initial-value:0deg;}
@keyframes spinEb{to{--eb-a:360deg;}}

#entry-logo{width:90px;height:90px;border-radius:50%;
  border:3px solid #ffd600;object-fit:cover;
  box-shadow:0 0 24px #ffd60066,0 0 48px #ff440033;
  margin-bottom:10px;}
#entry-title{font-family:'Bangers',cursive;font-size:28px;letter-spacing:4px;
  color:#ffd600;text-shadow:0 0 14px #ffd60088;margin-bottom:2px;line-height:1;}
#entry-game{font-family:'Bangers',cursive;font-size:15px;letter-spacing:3px;
  color:#06B6D4;margin-bottom:4px;}
#entry-sub{color:#555;font-size:11px;letter-spacing:2px;margin-bottom:16px;text-transform:uppercase;}

#entry-input-wrap{position:relative;margin-bottom:14px;}
#apodo-input{width:100%;padding:10px 40px 10px 14px;border-radius:8px;
  border:1px solid #ffd60066;background:#060612;color:#fff;
  font-family:'Bangers',cursive;font-size:22px;letter-spacing:3px;
  text-align:center;outline:none;box-sizing:border-box;}
#apodo-input:focus{border-color:#ffd600;box-shadow:0 0 10px #ffd60044;}
#apodo-input::placeholder{color:#2a2a40;}
#apodo-random{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;font-size:18px;cursor:pointer;padding:0;line-height:1;
  color:#ffd60088;}
#apodo-random:hover{color:#ffd600;}

#entry-btn{width:100%;padding:13px;border:2px solid #ffd600;border-radius:10px;
  background:linear-gradient(135deg,#1a0a00,#0d1a3a);color:#ffd600;
  font-family:'Bangers',cursive;font-size:24px;letter-spacing:4px;cursor:pointer;
  text-shadow:0 0 10px #ffd60066;transition:all .2s;}
#entry-btn:hover{background:#ffd600;color:#000;text-shadow:none;box-shadow:0 0 20px #ffd600;}
#entry-exit{width:100%;padding:9px;margin-top:8px;border:1px solid #444;border-radius:10px;
  background:transparent;color:#888;
  font-family:'Bangers',cursive;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
#entry-exit:hover{border-color:#ef4444;color:#ef4444;}
#entry-social{display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
#entry-social a{font-size:11px;padding:5px 10px;border-radius:6px;text-decoration:none;font-weight:700;}
.es-web{background:#06B6D4;color:#000;}
.es-app{background:#1d4ed8;color:#fff;}
.es-fb{background:#1877f2;color:#fff;}

/* ── GAME OVER OVERLAY ── */
#go-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.85);
  justify-content:center;align-items:center;}
#go-overlay.show{display:flex;}
#go-box{background:linear-gradient(135deg,#0d0d22,#1a0030);
  border:2px solid #ffd600;border-radius:20px;padding:28px 32px;
  text-align:center;width:min(92vw,340px);
  box-shadow:0 0 60px rgba(255,214,0,.25);}
#go-logo{width:60px;height:60px;border-radius:50%;border:2px solid #ff4400;
  object-fit:cover;box-shadow:0 0 16px #ff440066;margin-bottom:8px;}
#go-title{font-family:'Bangers',cursive;font-size:48px;letter-spacing:6px;color:#ff4400;
  text-shadow:0 0 30px #ff4400;animation:goGlow 1s ease-in-out infinite alternate;line-height:1;}
@keyframes goGlow{from{text-shadow:0 0 20px #ff4400;}to{text-shadow:0 0 50px #ff4400,0 0 80px #ff000099;}}
#go-apodo{font-family:'Bangers',cursive;font-size:18px;color:#06B6D4;letter-spacing:2px;margin:6px 0 2px;}
#go-score{font-family:'Orbitron',monospace;font-size:22px;color:#ffd600;margin-bottom:18px;}
#go-buttons{display:flex;flex-direction:column;gap:10px;}
#go-btn{padding:11px;border:2px solid #ffd600;border-radius:10px;background:#111827;
  color:#ffd600;font-family:'Bangers',cursive;font-size:20px;letter-spacing:3px;cursor:pointer;}
#go-btn:hover{background:#ffd600;color:#000;}
#go-exit{padding:9px;border:1px solid #444;border-radius:10px;background:transparent;
  color:#666;font-family:'Bangers',cursive;font-size:16px;letter-spacing:2px;cursor:pointer;}
#go-exit:hover{border-color:#ff4400;color:#ff4400;}

/* ── LOGO TOP ── */
#logo-top{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px;}
#logo-top img{width:34px;height:34px;border-radius:50%;border:2px solid #ffd600;object-fit:cover;}
#logo-top span{font-family:'Bangers',cursive;font-size:18px;letter-spacing:3px;color:#ffd600;}

/* ── LÍDER (ahora se dibuja dentro del canvas, ver drawLiderBanner) ── */
</style>
</head>

const AC=new(window.AudioContext||window.webkitAudioContext)();
function resumeAC(){if(AC.state==='suspended')AC.resume();}
function beep(freq,dur,type='square',vol=0.18,detune=0){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.value=freq;o.detune.value=detune;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}

function initBricks(){
  bricks=[];
  const total=BRK_ROWS*COLS;
  const GOOD_DROPS=['life','shield','wide'];
  const BAD_DROPS=['lostlife','shrink','shrink','mini'];
  const MID_DROPS=['triple','neon'];
  const allIdxs=[...Array(total).keys()].sort(()=>Math.random()-0.5);
  const dropMap={};
  // Trofeo garantizado: siempre hay al menos 1 por nivel
  const trophyIdx=allIdxs[0];
  dropMap[trophyIdx]='trophy';
  allIdxs.slice(1,1+Math.floor(total*0.15)).forEach(i=>{dropMap[i]=GOOD_DROPS[Math.floor(Math.random()*GOOD_DROPS.length)];});
  allIdxs.slice(1+Math.floor(total*0.15),1+Math.floor(total*0.30)).forEach(i=>{dropMap[i]=BAD_DROPS[Math.floor(Math.random()*BAD_DROPS.length)];});
  allIdxs.slice(1+Math.floor(total*0.30),1+Math.floor(total*0.40)).forEach(i=>{dropMap[i]=MID_DROPS[Math.floor(Math.random()*MID_DROPS.length)];});

  const specialIdx=allIdxs[Math.floor(total*0.40)+1];
  // armored bricks: % increases with level
  const armorChance=Math.min(0.55, 0.08+0.07*(level-1));
  // explosive bricks: 1 per level from level 2
  const explosiveCount=Math.min(level-1, 5);
  const explosiveSet=new Set(allIdxs.slice(Math.floor(total*0.42)+1, Math.floor(total*0.42)+1+explosiveCount));

  for(let r=0;r<BRK_ROWS;r++){
    for(let c=0;c<COLS;c++){
      const idx=r*COLS+c;
      const p=PARTIES[idx%PARTIES.length];
      const isSpecial=(idx===specialIdx);
      const isExplosive=!isSpecial&&explosiveSet.has(idx);
      const dt=dropMap[idx]||null;
      const isGood=dt?DROP_TYPES.find(x=>x.id===dt)?.good:null;
      // armored = needs 2-3 hits (harder per level)
      const isArmored=!isSpecial&&!isExplosive&&Math.random()<armorChance;
      const hitMax=isSpecial?1:isExplosive?1:isArmored?(level>2?3:2):1;
      bricks.push({
        x:20+c*(BRK_W+4),y:50+r*(BRK_H+5),
        w:BRK_W,h:BRK_H,
        alive:true,
        color:isSpecial?'#ffd600':isExplosive?'#ff6600':p.color,
        label:isSpecial?'⭐':isExplosive?'💣':p.label,
        img:isSpecial||isExplosive?null:IMGS[p.label],
        hits:hitMax, hitMax,
        special:isSpecial, explosive:isExplosive, armored:isArmored,
        dropType:dt, dropGood:isGood,
        shakeX:0, // for damage shake
      });
    }
  }
  aliveBrickCount=bricks.length;
}

// ── particle system ──────────────────────────────────────────────────────
const particles=[];
const MAX_PARTICLES=200; // hard cap
function spawnParticles(x,y,color){
  // cap total to avoid spike
  const slots=Math.min(8, MAX_PARTICLES-particles.length);
  for(let i=0;i<slots;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:1,color});
  }
}
function updateParticles(dt){
  const s=dt/16;
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*s;p.y+=p.vy*s;p.vy+=0.15*s;p.life-=0.04*s;
    if(p.life<=0){particles[i]=particles[particles.length-1];particles.pop();}
  }
}
function drawParticles(){
  if(!particles.length)return;
  // group by color to reduce fillStyle changes
  const byColor={};
  for(const p of particles){
    if(!byColor[p.color])byColor[p.color]=[];
    byColor[p.color].push(p);
  }
  for(const [color,arr] of Object.entries(byColor)){
    ctx.save();
    ctx.fillStyle=color;
    for(const p of arr){
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}

function spawnDrop(x,y,type){
  const t=DROP_TYPES.find(d=>d.id===type);
  // 'wide' is a SECRET drop — invisible capsule, no label
  drops.push({x,y,vy:1.5,type,life:1,w:44,h:22,secret:type==='wide'});
}
function updateDrops(dt){
  const s=dt/16;
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];
    d.y+=d.vy*s;
    if(d.y+d.h>=paddle.y&&d.y<=paddle.y+paddle.h&&
       d.x+d.w/2>=paddle.x&&d.x+d.w/2<=paddle.x+paddle.w){
      applyDrop(d.type);drops.splice(i,1);continue;
    }
    if(d.y>H)drops.splice(i,1);
  }
}
function applyDrop(type){
  const t=DROP_TYPES.find(x=>x.id===type);
  if(type==='shield'){
    shieldActive=7000;
    flashMsg('🛡️ ESCUDO ACTIVO','#06B6D4');
  }
  else if(type==='life'){
    lives=Math.min(lives+1,20);hud();
    lifeFlash=40;sndPowerGood();
    flashMsg('❤️ +VIDA','#22c55e');
  }
  else if(type==='lostlife'){
    if(shieldActive>0){flashMsg('🛡️ BLOQUEADO!','#06B6D4');return;}
    lives=Math.max(0,lives-1);hud();
    vibrateTimer=18;lifeFlash=-30;sndPowerBad();
    flashMsg('💔 -VIDA','#ef4444');
    if(lives<=0){state='gameover';cancelAnimationFrame(raf);showGameOver();}
  }
  else if(type==='trophy'){
    trophyTimer=TROPHY_DUR;
    for(const b of balls){
      if(b.evil)continue;
      if(!b.baseR)b.baseR=b.r;
      b.r=b.baseR*2;
      b.trophy=true;
    }
    vibrateTimer=8;
    sndPowerGood();
    flashMsg('🏆 ¡PELOTA TROFEO! 6s','#ffd600');
  }
  else if(type==='triple'){
    const src=balls[0]||{x:W/2,y:H/2,vx:3,vy:-3,r:9};
    spawnExtraBalls(src);
    flashMsg('⚡ TRIPLE!','#ffd600');
  }
  else if(type==='neon'){
    let count=0;
    for(const b of bricks){
      if(!b.alive)continue;
      for(let i=0;i<4;i++)spawnParticles(b.x+b.w/2,b.y+b.h/2,b.color);
      count++;if(count>=6)break;
    }
    flashMsg('🌈 LLUVIA NEÓN','#c026d3');
  }
  else if(type==='wide'){
    padMod=1.35;padModTimer=10000;
    flashMsg('▬ MEGA PALETA','#00ff88');
  }
  else if(type==='shrink'){
    padMod=0.10;padModTimer=3000;
    vibrateTimer=10;
    flashMsg('↔ TABLITA!','#ff4400');
  }
  else if(type==='mini'){
    // caos: max 5 pelotas extras (no 10)
    padMod=0.85;padModTimer=7000;
    vibrateTimer=14;lifeFlash=-20;
    const src=balls[0]||{x:W/2,y:H/2,vx:3,vy:-3,r:9};
    const spd=Math.hypot(src.vx,src.vy);
    const need=Math.min(3,4-balls.length); // max total 4 balls
    for(let i=0;i<need;i++){
      const angle=(Math.random()*Math.PI)-Math.PI/2;
      balls.push({x:W/2,y:H/2,vx:Math.cos(angle)*spd,vy:-Math.abs(Math.sin(angle)*spd),r:9,evil:true});
    }
    flashMsg('💥 CAOS!','#ff0066');
  }
}

function updateRingSpeed(){

  // linear: full board=4s, 0 bricks=0.3s — each brick makes it faster

let _shakeSaved=false;

  if(vibrateTimer>0){
    const sh=Math.sin(vibrateTimer*1.8)*5*(vibrateTimer/18);

  }

function drawBricks(){
  bricks.forEach(b=>{
    if(!b.alive)return;
    // damage shake decay
    if(b.shakeX){b.shakeX*=0.7;if(Math.abs(b.shakeX)<0.3)b.shakeX=0;}
    ctx.save();
    ctx.translate(b.shakeX||0,0);
    if(b.special){
      ctx.strokeStyle='#ffd600';ctx.lineWidth=2.5;
      ctx.fillStyle='#ffd60022';
      ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.fill();ctx.stroke();
      ctx.fillStyle='#ffd600';ctx.font='bold 13px Bangers,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⭐ SPECIAL',b.x+b.w/2,b.y+b.h/2);
    } else if(b.explosive){
      // orange pulsing glow
      const pulse=0.5+0.5*Math.sin(Date.now()*0.008);
      ctx.strokeStyle=`rgba(255,${100+Math.floor(pulse*80)},0,1)`;ctx.lineWidth=2;
      ctx.fillStyle=`rgba(255,80,0,${0.15+pulse*0.1})`;
      ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.fill();ctx.stroke();
      ctx.fillStyle='#ffaa00';ctx.font='bold 14px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('💣',b.x+b.w/2,b.y+b.h/2);
    } else if(b.armored){
      // color shifts: full=gold ring, low hp=orange-red — but always show party logo
      const ratio=b.hits/b.hitMax;
      let col=ratio>0.66?'#ffd600':ratio>0.33?'#ff9900':'#ff3300';
      ctx.globalAlpha=1;
      ctx.fillStyle=b.color+'22';
      ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.fill();
      ctx.strokeStyle=col;ctx.lineWidth=2.5;
      ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.stroke();
      if(b.img&&b.img.complete&&b.img.naturalWidth>0){
        const size=b.h-10;
        ctx.drawImage(b.img,b.x+(b.w-size)/2,b.y+2,size,size);
      }
      // hits-remaining number badge, bottom-center
      ctx.fillStyle=col;
      ctx.beginPath();ctx.arc(b.x+b.w/2,b.y+b.h-6,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.font='bold 10px Bangers,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(String(b.hits),b.x+b.w/2,b.y+b.h-6+0.5);
    } else {
      ctx.globalAlpha=b.hits===2?0.4:1;
      ctx.fillStyle=b.color+'22';
      ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.fill();
      ctx.strokeStyle=b.color;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.stroke();
      if(b.img&&b.img.complete&&b.img.naturalWidth>0){
        const size=b.h-6;
        ctx.drawImage(b.img,b.x+(b.w-size)/2,b.y+3,size,size);
      }
      if(b.dropType){
        const dotColor=b.dropGood===true?'#22c55e':b.dropGood===false?'#ef4444':'#ffd600';
        ctx.globalAlpha=1;
        ctx.fillStyle=dotColor;
        ctx.beginPath();ctx.arc(b.x+b.w-7,b.y+7,4,0,Math.PI*2);ctx.fill();
      }
      // badge de golpes requeridos en bloques que necesitan >1 hit
      if(b.hits>1){
        ctx.globalAlpha=1;
        const bc=b.hits>=3?'#ff2200':b.hits===2?'#ff9900':'#ffd600';
        ctx.fillStyle=bc;
        ctx.beginPath();ctx.arc(b.x+8,b.y+b.h-7,7,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.stroke();
        ctx.fillStyle='#000';ctx.font='bold 9px Arial,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(String(b.hits),b.x+8,b.y+b.h-7+0.5);
      }
    }
    ctx.restore();
  });

  // Big combo multiplier display
  if(comboDisplay>0){
    comboDisplay--;
    const alpha=Math.min(1,comboDisplay/20);
    const scale=1+0.5*(1-comboDisplay/40);
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(W/2,H/2-40);
    ctx.scale(scale,scale);
    ctx.fillStyle='#ffd600';
    ctx.font='bold 64px Bangers,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.strokeStyle='#000';ctx.lineWidth=4;
    ctx.strokeText(comboDisplayText,0,0);
    ctx.fillText(comboDisplayText,0,0);
    ctx.restore();
  }
}

// ball trail — circular buffer per ball
const TRAIL_LEN=18;
const ballTrails=new WeakMap();
function drawBall(){
  balls.forEach(bl=>{
    // trail
    if(!ballTrails.has(bl)) ballTrails.set(bl,[]);
    const trail=ballTrails.get(bl);
    trail.push({x:bl.x,y:bl.y});
    if(trail.length>TRAIL_LEN) trail.shift();

    const isEvil=bl.evil;
    const isTrophy=bl.trophy;
    const baseColor=isEvil?'#ff2222':isTrophy?'#ffd600':'#00ccff';
    const trailColor=isEvil?'255,40,40':isTrophy?'255,214,0':'0,200,255';

    ctx.save();
    for(let i=0;i<trail.length-1;i++){
      const t=trail[i];
      const alpha=((i+1)/trail.length)*0.55;
      const r=bl.r*(0.2+(0.7*(i/trail.length)));
      ctx.globalAlpha=alpha;
      ctx.fillStyle=`rgba(${trailColor},1)`;
      ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();

    if(isTrophy){
      // pulsing gold ring
      const pulse=0.6+0.4*Math.sin(Date.now()*0.012);
      ctx.save();
      ctx.strokeStyle=`rgba(255,214,0,${pulse})`;ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(bl.x,bl.y,bl.r+5,0,Math.PI*2);ctx.stroke();
      // circular clip for logo
      ctx.beginPath();ctx.arc(bl.x,bl.y,bl.r,0,Math.PI*2);ctx.closePath();ctx.clip();
      ctx.fillStyle='#fff';ctx.fillRect(bl.x-bl.r,bl.y-bl.r,bl.r*2,bl.r*2);
      if(trophyLogo.complete&&trophyLogo.naturalWidth>0){
        ctx.drawImage(trophyLogo,bl.x-bl.r,bl.y-bl.r,bl.r*2,bl.r*2);
      } else {
        ctx.fillStyle='#ffd600';ctx.fillRect(bl.x-bl.r,bl.y-bl.r,bl.r*2,bl.r*2);
      }
      ctx.restore();
      ctx.save();
      ctx.strokeStyle='#ffd600';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(bl.x,bl.y,bl.r,0,Math.PI*2);ctx.stroke();
      ctx.restore();
      return;
    }

    // ball body
    ctx.save();
    ctx.fillStyle=baseColor;
    ctx.beginPath();ctx.arc(bl.x,bl.y,bl.r,0,Math.PI*2);ctx.fill();
    // glow ring
    ctx.strokeStyle=isEvil?'#ff000066':'#00eeff66';
    ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(bl.x,bl.y,bl.r+2,0,Math.PI*2);ctx.stroke();
    // specular dot
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath();ctx.arc(bl.x-bl.r*0.3,bl.y-bl.r*0.3,bl.r*0.25,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

function drawPaddle(){
  ctx.save();
  const px=paddle.x, py=paddle.y, pw=paddle.w, ph=PAD_H+6;
  if(shieldActive>0){
    ctx.strokeStyle='rgba(6,182,212,0.5)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,py+ph+6);ctx.lineTo(W,py+ph+6);ctx.stroke();
  }
  const flash=Math.min(1,paddleFlash/120);
  // flat metallic body
  const bodyG=ctx.createLinearGradient(px,py,px,py+ph);
  if(flash>0){
    bodyG.addColorStop(0,'#fff9c4');bodyG.addColorStop(0.5,'#ffd740');bodyG.addColorStop(1,'#fff9c4');
  } else {
    bodyG.addColorStop(0,'#1a1a2e');bodyG.addColorStop(0.4,'#0d0d1a');bodyG.addColorStop(1,'#1a1a2e');
  }
  ctx.fillStyle=bodyG;
  ctx.beginPath();ctx.roundRect(px,py,pw,ph,ph/2);ctx.fill();
  // borde oscuro estilo KITT
  ctx.strokeStyle=flash>0?'#ffd600':'#333355';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(px,py,pw,ph,ph/2);ctx.stroke();
  // top highlight
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.beginPath();ctx.roundRect(px+4,py+2,pw-8,ph*0.32,ph/2);ctx.fill();

  // ── EFECTO KITT: escáner rojo que barre de lado a lado ──
  if(!flash){
    const t=Date.now()*0.001;
    // posición del escáner: va de 0→1→0 en ciclo (~1.8s)
    const cycle=(t%1.8)/1.8;
    const pos=cycle<0.5?(cycle*2):(2-cycle*2); // ping-pong
    const kx=px+8+(pw-16)*pos;
    const ky=py+ph/2;
    // estela (trail) antes del punto
    const trailLen=pw*0.18;
    const dir=cycle<0.5?1:-1;
    const trailG=ctx.createLinearGradient(kx-dir*trailLen,ky,kx,ky);
    trailG.addColorStop(0,'rgba(255,0,0,0)');
    trailG.addColorStop(1,'rgba(255,30,0,0.45)');
    ctx.fillStyle=trailG;
    ctx.fillRect(kx-dir*trailLen,py+3,dir*trailLen,ph-6);
    // punto principal — glow rojo brillante
    ctx.shadowColor='#ff0000';ctx.shadowBlur=18;
    ctx.fillStyle='#ff2200';
    ctx.beginPath();ctx.arc(kx,ky,5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // punto interior blanco para brillo
    ctx.fillStyle='rgba(255,200,200,0.9)';
    ctx.beginPath();ctx.arc(kx-1,ky-1,2,0,Math.PI*2);ctx.fill();
  }

  // center gem
  const gcx=px+pw/2, gcy=py+ph/2, gr=ph*0.36;
  ctx.fillStyle=flash>0?'#ffd600':'rgba(0,100,255,0.3)';
  ctx.beginPath();ctx.arc(gcx,gcy,gr,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath();ctx.arc(gcx-gr*0.28,gcy-gr*0.28,gr*0.22,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function collRect(bl,bx,by,bw,bh){
  const nx=Math.max(bx,Math.min(bl.x,bx+bw));
  const ny=Math.max(by,Math.min(bl.y,by+bh));
  return Math.hypot(bl.x-nx,bl.y-ny)<bl.r;
}

// Garantiza que la pelota nunca quede viajando casi perfectamente horizontal
// o vertical, para que no se quede "pegando" de pared a pared en línea recta.
const MIN_ANGLE_RATIO=0.35; // mínima proporción entre el eje menor y el eje mayor
function ensureAngle(bl){
  const spd=Math.hypot(bl.vx,bl.vy)||1;
  const minComp=spd*MIN_ANGLE_RATIO;
  if(Math.abs(bl.vx)<minComp){
    bl.vx=(bl.vx<0?-1:1)*minComp || minComp*(Math.random()>0.5?1:-1);
  }
  if(Math.abs(bl.vy)<minComp){
    bl.vy=(bl.vy<0?-1:1)*minComp || -minComp;
  }
  // renormalizar para conservar la velocidad original
  const newSpd=Math.hypot(bl.vx,bl.vy);
  const scale=spd/newSpd;
  bl.vx*=scale;bl.vy*=scale;
}

function spawnExtraBalls(fromBall){
  const spd=Math.hypot(fromBall.vx,fromBall.vy);
  for(let a of [-Math.PI/6, Math.PI/6]){
    const angle=Math.atan2(fromBall.vy,fromBall.vx)+a;
    balls.push({x:fromBall.x,y:fromBall.y,
      vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r:9});
  }
}

function update(dt){
  if(paused||state!=='playing')return;
  const s=dt/16;

  // paddle modifier timer
  if(padModTimer>0){
    padModTimer=Math.max(0,padModTimer-dt);
    if(padModTimer===0){padMod=1.0;}
  }
  const curPW=Math.round(PAD_W*padMod);
  // keep paddle center stable on size change
  if(paddle.w!==curPW){
    const cx=paddle.x+paddle.w/2;
    paddle.w=curPW;
    paddle.x=Math.max(0,Math.min(W-paddle.w,cx-paddle.w/2));
  }

  if(keys['ArrowLeft']||keys['a'])paddle.x=Math.max(0,paddle.x-7.2*s);
  if(keys['ArrowRight']||keys['d'])paddle.x=Math.min(W-paddle.w,paddle.x+7.2*s);
  if(paddleFlash>0)paddleFlash=Math.max(0,paddleFlash-dt);
  if(shieldActive>0)shieldActive=Math.max(0,shieldActive-dt);
  if(trophyTimer>0){
    trophyTimer=Math.max(0,trophyTimer-dt);
    if(trophyTimer===0){
      for(const b of balls){
        if(b.trophy){b.r=b.baseR||9;b.trophy=false;}
      }
    }
  }

  const toRemove=new Set();
  for(let i=balls.length-1;i>=0;i--){
    const bl=balls[i];
    bl.x+=bl.vx*s;bl.y+=bl.vy*s;
    if(bl.x-bl.r<0){bl.x=bl.r;bl.vx=Math.abs(bl.vx);ensureAngle(bl);if(bl.trophy)wallSpark(bl);}
    if(bl.x+bl.r>W){bl.x=W-bl.r;bl.vx=-Math.abs(bl.vx);ensureAngle(bl);if(bl.trophy)wallSpark(bl);}
    if(bl.y-bl.r<0){bl.y=bl.r;bl.vy=Math.abs(bl.vy);ensureAngle(bl);if(bl.trophy)wallSpark(bl);}
    if(bl.y+bl.r>H){
      if(bl.evil){
        // evil ball falls off = lose a life, with explosion effect
        if(shieldActive>0){
          shieldActive=0;spawnParticles(bl.x,H-10,'#06B6D4');
        } else {
          lives=Math.max(0,lives-1);hud();
          vibrateTimer=12;lifeFlash=-25;
          sndExplosion();
          for(let i=0;i<3;i++) spawnParticles(bl.x,H-10,'#ff2222');
          flashMsg('💥 PELOTA TRAMPA EXPLOTÓ','#ef4444');
          if(lives<=0){state='gameover';cancelAnimationFrame(raf);showGameOver();}
        }
        toRemove.add(i);
      } else if(shieldActive>0&&balls.filter(x=>!x.evil).length===1){
        bl.vy=-Math.abs(bl.vy);shieldActive=0;
        spawnParticles(bl.x,H-10,'#06B6D4');
      } else {
        toRemove.add(i);
      }
      continue;
    }
    if(collRect(bl,paddle.x,paddle.y,paddle.w,paddle.h)&&bl.vy>0){
      resumeAC();
      const hit=(bl.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      bl.vx=hit*5.5;bl.vy=-Math.abs(bl.vy);bl.y=paddle.y-bl.r-1;
      spawnParticles(bl.x,bl.y,'#06B6D4');
      paddleFlash=120;comboHits++;
      // combo multiplier
      comboMult=comboHits>=10?4:comboHits>=6?3:comboHits>=3?2:1;
      if(comboMult>1){
        comboDisplayText='x'+comboMult+'!';comboDisplay=40;
        sndCombo(comboMult);
      } else { sndPaddle(); }
      if(comboHits===3)spawnDrop(bl.x,paddle.y,'shield');
      else if(comboHits===4)spawnDrop(bl.x,paddle.y,'life');
      else if(comboHits===5)spawnDrop(bl.x,paddle.y,'triple');
      else if(comboHits>=10&&comboHits%10===0)spawnDrop(bl.x,paddle.y,'neon');
      hud();
    }
    for(let b of bricks){
      if(!b.alive)continue;
      if(collRect(bl,b.x,b.y,b.w,b.h)){
        resumeAC();
        b.hits-=(bl.trophy?2:1);
        b.shakeX=4; // damage shake
        if(b.hits<=0){
          b.alive=false;
          aliveBrickCount=Math.max(0,aliveBrickCount-1);
          updateRingSpeed();
          const pts=(b.special?20:b.explosive?12:b.armored?10:b.dropType?8:4)*level*comboMult*(bl.trophy?2:1);
          score+=pts;
          spawnParticles(b.x+b.w/2,b.y+b.h/2,b.color);
          if(b.explosive){
            // chain: destroy 8 neighbors
            sndExplosion();
            bricks.forEach(nb=>{
              if(!nb.alive)return;
              const dx=Math.abs((nb.x+nb.w/2)-(b.x+b.w/2));
              const dy=Math.abs((nb.y+nb.h/2)-(b.y+b.h/2));
              if(dx<BRK_W*1.5&&dy<BRK_H*1.5&&nb!==b){
                nb.alive=false;
                aliveBrickCount=Math.max(0,aliveBrickCount-1);
                score+=(4*level*comboMult*(bl.trophy?2:1));
                for(let i=0;i<3;i++) spawnParticles(nb.x+nb.w/2,nb.y+nb.h/2,nb.color);
                if(nb.dropType) spawnDrop(nb.x+nb.w/2,nb.y+nb.h,nb.dropType);
              }
            });
            updateRingSpeed();
          } else if(b.armored){
            sndArmor();
          } else {
            sndBrick(b.color);
          }
          if(b.special){
            spawnExtraBalls(bl);lives+=2;hud();lifeFlash=60;
            sndPowerGood();
            msg.textContent='⭐ +2 VIDAS · ¡TRIPLE PELOTA!';
            setTimeout(()=>{if(state==='playing')msg.textContent='';},2200);
          }
          if(b.dropType) spawnDrop(b.x+b.w/2,b.y+b.h,b.dropType);
        } else {
          // armored not destroyed — different sound
          sndArmor();
        }
        const ol=bl.x+bl.r-b.x,or2=b.x+b.w-(bl.x-bl.r);
        const ot=bl.y+bl.r-b.y,ob=b.y+b.h-(bl.y-bl.r);
        if(Math.min(ol,or2)<Math.min(ot,ob))bl.vx=-bl.vx;else bl.vy=-bl.vy;
        hud();break;
      }
    }
    // secret wide drop
    if(bl.y<H/2&&Math.random()<0.0008){
      const alive=bricks.filter(b=>b.alive);
      if(alive.length){
        const rb=alive[Math.floor(Math.random()*alive.length)];
        spawnDrop(rb.x+rb.w/2,rb.y+rb.h,'wide');
      }
    }
  }
  // Remove fallen balls AFTER the loop — only lose a life when all NORMAL balls are gone
  for(const i of [...toRemove].sort((a,b)=>b-a)) balls.splice(i,1);
  const normalBalls=balls.filter(x=>!x.evil);
  if(normalBalls.length===0&&balls.length>=0){
    // check if any normal ball existed before removal (avoid double trigger)
    comboHits=0;lives--;hud();
    vibrateTimer=14;lifeFlash=-35;
    if(lives<=0){
      showGameOver();return;
    }
    initBall();balls=[ball];
  }
  updateDrops(dt);updateParticles(dt);
  if(!aliveBrickCount){
    sndLevelUp();
    // confetti burst
    const colors=['#ffd600','#ff4400','#00e5ff','#c026d3','#22c55e','#ff0066','#fff'];
    for(let i=0;i<60;i++){
      const cx=Math.random()*W,cy=Math.random()*(H*0.6);
      spawnParticles(cx,cy,colors[Math.floor(Math.random()*colors.length)]);
    }
    level++;initBricks();initBall();balls=[ball];comboHits=0;comboMult=1;
    msg.textContent='🎉 ¡NIVEL '+level+'!';
    msg.style.color='#ffd600';msg.style.fontSize='18px';
    setTimeout(()=>{if(state==='playing'){msg.textContent='';msg.style.fontSize='';msg.style.color='#06B6D4';}},2000);
    hud();
  }
}

// ── Countdown 3-2-1 ──────────────────────────────────────────────────────
function startCountdown(cb){
  const overlay=document.getElementById('countdown-overlay');
  const num=document.getElementById('countdown-num');
  let n=3;
  overlay.classList.add('show');
  function tick(){
    num.textContent=n;
    // re-trigger animation
    num.style.animation='none';
    void num.offsetWidth;
    num.style.animation='cdPop .9s ease-in-out forwards';
    if(n===0){
      overlay.classList.remove('show');
      cb();return;
    }
    n--;setTimeout(tick,950);
  }
  num.textContent='¡JUEGA!';
  tick();
}

// ── Entry modal ──────────────────────────────────────────────────────────
const APODOS_RANDOM=['La Bandera 🦅','La Guerrera 💥','Don Beto 🎩','El Potencia 💪',

function randomApodo(){

}

document.getElementById('entry-btn').addEventListener('click',()=>{

});
document.getElementById('exitBtn').addEventListener('click',()=>{

});

// ── Leaderboard UI ───────────────────────────────────────────────────────
const MEDALS=['🥇','🥈','🥉'];
function fmtFecha(iso){
  if(!iso)return '—';
  const d=new Date(iso);
  return d.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'2-digit'});
}
async function loadLeaderboardUI(){
  const inner=document.getElementById('lb-inner');
  const loadEl=document.getElementById('lb-loading');
  if(loadEl)loadEl.textContent='Cargando...';
  const data=await loadLeaderboard();
  // remove old table if any
  const oldT=inner.querySelector('.lb-table-wrap');if(oldT)oldT.remove();
  if(loadEl)loadEl.style.display='none';
  if(!data||!data.length){
    if(loadEl){loadEl.textContent='¡Sé el primero en el ranking! 🏆';loadEl.style.display='block';}
    return;
  }
  const wrap=document.createElement('div');
  wrap.className='lb-table-wrap';
  wrap.innerHTML=`<table>
    <tr>
      <th>#</th>
      <th>JUGADOR</th>
      <th style="font-family:'Orbitron',monospace">PUNTOS</th>
      <th>NIV</th>
      <th>FECHA</th>
    </tr>
    ${data.map((r,i)=>{
      const medal=i<3?MEDALS[i]:(i+1);
      const apodo=(r.nombre||'Anon').trim();
      return `<tr>
        <td style="text-align:center;font-size:${i<3?'18':'13'}px">${medal}</td>
        <td><span style="font-family:'Bangers',cursive;letter-spacing:1px">${apodo}</span></td>
        <td style="font-family:'Orbitron',monospace;color:#ffd740;text-align:right">${(r.puntos||0).toLocaleString()}</td>
        <td style="color:#9bc;text-align:center">${r.nivel||1}</td>
        <td style="color:#666;font-size:11px;text-align:center">${fmtFecha(r.fecha)}</td>
      </tr>`;
    }).join('')}
  </table>`;
  inner.appendChild(wrap);
}

// ── LÍDER (dibujado dentro del canvas, arriba de los ladrillos) ──────────
let liderFontReady=false;
if(document.fonts && document.fonts.load){
  document.fonts.load("900 22px 'Anton'").then(()=>{liderFontReady=true;}).catch(()=>{liderFontReady=true;});
  document.fonts.load("900 22px 'Bangers'").catch(()=>{});
} else { liderFontReady=true; }
const LIDER_COLORS=['#ffd600','#ff3333','#00e5ff','#c026d3','#22c55e','#f97316','#ffffff','#f472b6'];
let liderText='⏳ Cargando líder...';
async function loadLiderBar(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/breakout_scores?select=nombre,puntos&order=puntos.desc&limit=1`,{
      headers:{'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON,'x-client-info':'breakout/1.0'}
    });
    const data=await r.json();
    if(data&&data.length){
      const top=data[0];
      let apodo=(top.nombre||'???').trim();
      if(apodo.length>14)apodo=apodo.slice(0,14);
      const pts=(top.puntos||0).toLocaleString();
      liderText=`LÍDER: ${apodo} — ${pts} PTS`;
    } else {
      liderText='¡SÉ EL PRIMER LÍDER!';
    }
  }catch(e){
    liderText='';
  }
}
loadLiderBar();
setInterval(loadLiderBar,30000);

// Loop ligero independiente: mantiene el banner del líder visible y animado
// en cualquier momento en que el loop principal del juego no esté corriendo
// (pantalla de inicio, pausa, game over), para que nunca "desaparezca".
function idleLiderLoop(){
  if(state!=='playing'){
    drawBG();
    drawLiderBanner();
    if(state==='idle'){drawBricks();drawPaddle();}
  }
  requestAnimationFrame(idleLiderLoop);
}
requestAnimationFrame(idleLiderLoop);

// Banner de guerra — culebra + cómic paleta FUEGO (sin azul agua)
const LIDER_BANNER_Y=3, LIDER_BANNER_H=38;
function drawLiderBanner(){
  if(!liderText)return;
  ctx.save();
  const bx=10, by=LIDER_BANNER_Y, bw=W-20, bh=LIDER_BANNER_H;

  // Sombra dura estilo cómic de guerra
  ctx.fillStyle='#000';
  ctx.fillRect(bx+5,by+5,bw,bh);

  // Fondo negro con tinte rojo — bunker
  const bg=ctx.createLinearGradient(bx,by,bx,by+bh);
  bg.addColorStop(0,'#1a0500');
  bg.addColorStop(0.5,'#0d0d0d');
  bg.addColorStop(1,'#1a0000');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();

  // Borde naranja-rojo grueso cómic
  ctx.lineWidth=4;ctx.strokeStyle='#ff6600';
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.stroke();
  ctx.lineWidth=2;ctx.strokeStyle='#000';
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.stroke();

  const t=Date.now()*0.001;
  ctx.textBaseline='middle';
  const cy=by+bh/2;

  // Estrella izquierda con rebote
  const starBounce=Math.abs(Math.sin(t*4))*3;
  const fontFamily=liderFontReady?"'Anton',sans-serif":"Arial Black,sans-serif";
  ctx.font=`bold 16px ${fontFamily}`;
  ctx.textAlign='left';
  ctx.fillStyle='#ff3300';
  ctx.shadowColor='#ff2200';ctx.shadowBlur=10;
  ctx.fillText('★',bx+8,cy-starBounce);
  ctx.shadowBlur=0;

  // Culebra + degradado fuego por letra — paleta GUERRA (rojo/naranja/oro, sin azul)
  ctx.font=`900 22px ${fontFamily}`;
  const chars=[...liderText];
  let totalW=0;
  const widths=chars.map(ch=>{const w=ctx.measureText(ch).width+2;totalW+=w;return w;});
  let cx2=bx+30+(bw-30)/2-totalW/2;

  // Dos paletas de fuego — llama viva vs brasa
  const firePals=[
    ['#ffffff','#ffee00','#ff7700','#cc1100'],  // llama brillante
    ['#ffee88','#ffbb00','#ff4400','#880000'],  // brasa profunda
  ];

  chars.forEach((ch,i)=>{
    const w=widths[i];
    const phase=t*5-i*0.5;
    const wave=Math.sin(phase)*5;
    const pulse=1+0.22*Math.max(0,Math.sin(phase));
    ctx.save();
    ctx.translate(cx2+w/2,cy+wave);
    ctx.scale(pulse,pulse);
    ctx.textAlign='center';
    ctx.font=`900 22px ${fontFamily}`;
    const palIdx=Math.sin(phase)>0.3?0:1;
    const pal=firePals[palIdx];
    const grad=ctx.createLinearGradient(0,-12,0,12);
    grad.addColorStop(0,pal[0]);
    grad.addColorStop(0.3,pal[1]);
    grad.addColorStop(0.65,pal[2]);
    grad.addColorStop(1,pal[3]);
    ctx.shadowColor=palIdx===0?'#ff6600':'#cc2200';
    ctx.shadowBlur=14;
    ctx.lineWidth=4;ctx.strokeStyle='#000';
    ctx.strokeText(ch,0,0);
    ctx.fillStyle=grad;
    ctx.fillText(ch,0,0);
    ctx.shadowBlur=0;
    ctx.restore();
    cx2+=w;
  });

  // Estrella derecha
  ctx.font=`bold 16px ${fontFamily}`;
  ctx.textAlign='right';
  ctx.fillStyle='#ff3300';
  ctx.shadowColor='#ff2200';ctx.shadowBlur=10;
  ctx.fillText('★',bx+bw-8,cy-starBounce);
  ctx.shadowBlur=0;

  ctx.restore();
}

// Leaderboard modal open/close
document.getElementById('lbBtn').addEventListener('click',()=>{
  const modal=document.getElementById('lb-modal');
  modal.classList.add('show');
  loadLeaderboardUI();
});
document.getElementById('lb-close').addEventListener('click',()=>{
  document.getElementById('lb-modal').classList.remove('show');
});
document.getElementById('lb-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('lb-modal'))
    document.getElementById('lb-modal').classList.remove('show');
});

function loop(t){
  const dt=Math.min(t-lastT,50);lastT=t;
  update(dt);
  drawBG();
  drawLiderBanner();
  drawBricks();drawPaddle();drawBall();drawParticles();drawDrops();drawScreenFlash();
  if(lifeFlash!==0||trophyTimer>0) hud();
  raf=requestAnimationFrame(loop);
}

startBtn.addEventListener('click',()=>{
  cancelAnimationFrame(raf);
  reset(state==='gameover'||state==='idle');
  paused=false;msg.textContent='';startBtn.textContent='▶ REINICIAR';
  startCountdown(()=>{
    state='playing';
    lastT=performance.now();raf=requestAnimationFrame(loop);
  });
});

pauseBtn.addEventListener('click',()=>{
  if(state!=='playing')return;
  paused=!paused;
  pauseBtn.textContent=paused?'▶ CONTINUAR':'⏸ PAUSA';
  if(!paused){lastT=performance.now();raf=requestAnimationFrame(loop);}
  else cancelAnimationFrame(raf);
});

document.addEventListener('keydown',e=>keys[e.key]=true);
document.addEventListener('keyup',e=>keys[e.key]=false);

// ── Touch controls (scale-aware drag, whole page) ──────────────────────
let touchX=null;
function getScaleX(){return W/canvas.getBoundingClientRect().width;}
function clampPaddle(x){return Math.max(0,Math.min(W-paddle.w,x));}
document.addEventListener('touchstart',e=>{
  if(state!=='playing')return;
  touchX=e.touches[0].clientX;
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(touchX===null||state!=='playing')return;
  const dx=(e.touches[0].clientX-touchX)*getScaleX();
  paddle.x=clampPaddle(paddle.x+dx);
  touchX=e.touches[0].clientX;
  e.preventDefault();
},{passive:false});
document.addEventListener('touchend',()=>{touchX=null;});
canvas.addEventListener('mousemove',e=>{
  if(state!=='playing')return;
  const r=canvas.getBoundingClientRect();
  const scaleX=W/r.width;
  paddle.x=Math.max(0,Math.min(W-paddle.w,(e.clientX-r.left)*scaleX-paddle.w/2));
});

reset(true);drawBG();drawLiderBanner();drawBricks();drawPaddle();
</script>
